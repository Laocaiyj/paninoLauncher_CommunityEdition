name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    name: Core and macOS quality gate
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.10.3.0"

      - name: Cache Cabal artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            core/dist-newstyle
          key: cabal-${{ runner.os }}-${{ hashFiles('core/panino-core.cabal', 'cabal.project') }}
          restore-keys: |
            cabal-${{ runner.os }}-

      - name: Update Cabal index
        run: cabal update

      - name: Run quality gate
        run: ./scripts/quality-local.sh
